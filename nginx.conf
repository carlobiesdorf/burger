server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /data/ {
        add_header Cache-Control "no-cache";
        types {
            application/json json;
        }
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
