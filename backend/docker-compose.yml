services:
  backend:
    build: .
    container_name: einb-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./data:/srv/data
      - /var/log/einb:/var/log/einb
    env_file:
      - .env
    environment:
      - SESSION_TTL_DAYS=30
      - TRIAL_QUESTIONS=15
      - COOKIE_SECURE=true
      - COOKIE_DOMAIN=einburgerungstest.cloudintrip.com
      - SUBSCRIPTION_DAYS=365
      - TELEGRAM_LOG_FILE=/var/log/einb/telegram.log
